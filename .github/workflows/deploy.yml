name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build CSS
        run: npm install && npm run build

      - name: Fetch latest release version
        id: version
        run: |
          TAG=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name',''))" 2>/dev/null || echo "")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest release tag: ${TAG}"

      - name: Inject version into index.html
        if: steps.version.outputs.tag != ''
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          python3 - <<'PYEOF'
          import re, os
          tag = os.environ["INJECT_TAG"]
          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()
          content = re.sub(
              r'<!--CURRENT_VERSION-->.*?<!--/CURRENT_VERSION-->',
              f'<!--CURRENT_VERSION-->{tag}<!--/CURRENT_VERSION-->',
              content,
              flags=re.DOTALL,
          )
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Injected version: {tag}")
          PYEOF
        env:
          INJECT_TAG: ${{ steps.version.outputs.tag }}

      - name: Fetch total downloads and inject into index.html
        run: |
          python3 - <<'PYEOF'
          import json, os, re, urllib.request

          token = os.environ.get("GITHUB_TOKEN", "")
          repo  = os.environ.get("GITHUB_REPOSITORY", "Dimasick-git/Ryzhenka")
          headers = {"Accept": "application/vnd.github.v3+json"}
          if token:
              headers["Authorization"] = f"Bearer {token}"

          REPOS = [
              "Ryzhenka", "Ryazhahand-Overlay", "Sys-clk", "Ryazhenkabestcfw-Tuner",
              "RyazhaTune", "AIO-Switch-Updater", "Mission-Control", "Ryazha-Status-Monitor",
              "Minecraft-Online-for-switch", "Fizeau", "SwitchWave", "ReverseNX-RT",
              "FPSLocker", "EdiZon", "ovlSysmodules", "PPSSPP"
          ]
          owner = repo.split("/")[0]
          total = 0
          for name in REPOS:
              try:
                  url = f"https://api.github.com/repos/{owner}/{name}/releases?per_page=100"
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=20) as r:
                      releases = json.load(r)
                  for rel in releases:
                      for asset in rel.get("assets", []):
                          total += asset.get("download_count", 0)
              except Exception as e:
                  print(f"  Skipped {name}: {e}")

          print(f"Total downloads: {total}")
          if total == 0:
              print("No downloads found, skipping index.html update")
          else:
              with open("index.html", "r", encoding="utf-8") as f:
                  content = f.read()
              new_content = re.sub(
                  r'<!--TOTAL_DOWNLOADS-->.*?<!--/TOTAL_DOWNLOADS-->',
                  f'<!--TOTAL_DOWNLOADS-->{total}<!--/TOTAL_DOWNLOADS-->',
                  content,
                  flags=re.DOTALL,
              )
              if new_content != content:
                  with open("index.html", "w", encoding="utf-8") as f:
                      f.write(new_content)
                  print(f"Injected total downloads: {total}")
              else:
                  print("No <!--TOTAL_DOWNLOADS--> marker in index.html — skipping")
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject CSS cache-busting query param
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|href=\"dist/output.css\"|href=\"dist/output.css?v=${SHA}\"|g" index.html
          echo "CSS cache-busting param: ?v=${SHA}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
